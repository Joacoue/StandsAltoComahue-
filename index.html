<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ACCES · Ventas</title>

<style>
body{font-family:Arial;background:#0c0c12;color:#fff;margin:0}
#loginScreen,#app{padding:20px}
input,button,select{padding:10px;margin:5px 0;width:100%}
button{cursor:pointer}
#app{display:none}
.top{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.card{background:#1e1e2a;padding:10px;border-radius:10px;cursor:pointer}
.cart{margin-top:20px}
</style>
</head>

<body>

<div id="loginScreen">
  <h2>ACCES</h2>
  <input id="liU" placeholder="Usuario">
  <input id="liP" type="password" placeholder="Contraseña">
  <select id="liS">
    <option value="1">Stand 1</option>
    <option value="2">Stand 2</option>
  </select>
  <button id="btnLogin">Ingresar</button>
  <div id="liErr" style="color:red;display:none">Error</div>
</div>

<div id="app">
  <div class="top">
    <h3 id="standPill"></h3>
    <button id="btnLogout">Salir</button>
  </div>

  <input id="search" placeholder="Buscar producto">

  <div id="prodGrid" class="grid"></div>

  <div class="cart">
    <h3>Carrito</h3>
    <div id="cartItems"></div>
    <h2 id="total">$0</h2>
    <button id="btnCobrar">Cobrar</button>
  </div>
</div>

<script>

// STORAGE
function dbGet(k){return JSON.parse(localStorage.getItem(k)||"null")}
function dbSet(k,v){localStorage.setItem(k,JSON.stringify(v))}

// INIT
function initData(){
  if(!dbGet("users")){
    dbSet("users",[
      {user:"admin",pass:"admin123",stand:"ambos"},
      {user:"vend1",pass:"1234",stand:"1"}
    ])
  }

  if(!dbGet("prods")){
    dbSet("prods",[
      {id:1,nombre:"Funda iPhone",precio:3000,stock:[10,5]},
      {id:2,nombre:"Cable USB",precio:1500,stock:[20,10]}
    ])
  }
}

initData()

// LOGIN
let CU=null

document.getElementById("btnLogin").onclick=function(){
  let u=liU.value.trim()
  let p=liP.value.trim()
  let s=liS.value

  let users=dbGet("users")||[]
  let ok=users.find(x=>x.user===u && x.pass===p)

  if(!ok){
    liErr.style.display="block"
    return
  }

  if(ok.stand!=="ambos" && ok.stand!==s){
    liErr.innerText="Sin acceso"
    liErr.style.display="block"
    return
  }

  CU={stand:parseInt(s)}

  loginScreen.style.display="none"
  app.style.display="block"

  standPill.innerText="Stand "+s

  render()
}

// LOGOUT
btnLogout.onclick=function(){
  location.reload()
}

// PRODUCTOS
let cart=[]

function render(){
  let prods=dbGet("prods")||[]
  let q=search.value.toLowerCase()

  let html=""

  prods.filter(p=>p.nombre.toLowerCase().includes(q))
  .forEach(p=>{
    html+=`
    <div class="card" onclick="add(${p.id})">
      ${p.nombre}<br>$${p.precio}
    </div>`
  })

  prodGrid.innerHTML=html
}

search.oninput=render

function add(id){
  let prods=dbGet("prods")
  let p=prods.find(x=>x.id===id)

  let item=cart.find(x=>x.id===id)
  if(item)item.qty++
  else cart.push({id:p.id,nombre:p.nombre,precio:p.precio,qty:1})

  renderCart()
}

// CARRITO
function renderCart(){
  let html=""
  let total=0

  cart.forEach(i=>{
    total+=i.precio*i.qty
    html+=`${i.nombre} x${i.qty} - $${i.precio*i.qty}<br>`
  })

  cartItems.innerHTML=html
  document.getElementById("total").innerText="$"+total
}

// COBRAR
btnCobrar.onclick=function(){
  if(!cart.length)return
  alert("Venta registrada")
  cart=[]
  renderCart()
}

</script>

</body>
</html>
